<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DPRO パーソナルジム｜iPad受付</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { --navy:#13213c; --navy2:#1d3259; --blue:#2563eb; --green:#087a55; --red:#c93444; --amber:#a56500; --purple:#7247b8; --text:#182235; --muted:#617086; --line:#d6dfeb; --bg:#eef2f7; --card:#fff; }
    * { box-sizing:border-box; }
    html { font-size:18px; }
    body { margin:0; color:var(--text); background:var(--bg); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.55; -webkit-tap-highlight-color:transparent; }
    button,input,select { font:inherit; }
    button { cursor:pointer; touch-action:manipulation; }
    .hidden { display:none !important; }
    .gate { position:fixed; inset:0; z-index:100; display:grid; place-items:center; padding:24px; background:linear-gradient(135deg,var(--navy),var(--navy2)); }
    .gate-card { width:min(600px,100%); border-radius:28px; padding:30px; background:#fff; box-shadow:0 30px 90px rgba(0,0,0,.3); }
    .brand { margin:0; color:var(--blue); font-size:.72rem; font-weight:950; letter-spacing:.15em; }
    h1,h2,h3 { line-height:1.35; }
    .gate h1 { margin:7px 0 0; font-size:1.8rem; }
    .sub { margin:6px 0 0; color:var(--muted); font-size:.88rem; }
    .auth-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; margin-top:22px; }
    input,select { width:100%; min-height:58px; border:2px solid var(--line); border-radius:15px; padding:11px 14px; color:var(--text); background:#fff; }
    input:focus,select:focus { outline:4px solid rgba(37,99,235,.13); border-color:var(--blue); }
    .btn { min-height:56px; border:0; border-radius:15px; padding:10px 18px; font-weight:950; }
    .btn-full { width:100%; margin-top:12px; }
    .btn-blue { color:#fff; background:var(--blue); }.btn-dark { color:#fff; background:var(--navy); }.btn-soft { color:var(--navy); background:#e5ebf4; }.btn-green { color:#fff; background:var(--green); }.btn-red { color:#fff; background:var(--red); }.btn-purple { color:#fff; background:var(--purple); }
    .btn:disabled { cursor:wait; opacity:.55; }
    .gate-message { min-height:28px; margin:10px 0 0; color:var(--red); font-weight:900; }
    .header { position:sticky; top:0; z-index:30; color:#fff; background:linear-gradient(135deg,var(--navy),var(--navy2)); box-shadow:0 5px 18px rgba(20,36,65,.22); }
    .header-inner { max-width:1280px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .header h1 { margin:2px 0 0; font-size:1.3rem; }
    .header .brand { color:#bed4ff; }
    .header-actions { display:flex; gap:9px; }
    .header-actions .btn { min-height:48px; padding:8px 14px; }
    .tabs { position:sticky; top:79px; z-index:25; display:grid; grid-template-columns:repeat(4,1fr); gap:8px; max-width:1280px; margin:0 auto; padding:12px 20px; background:rgba(238,242,247,.96); backdrop-filter:blur(10px); }
    .tab { min-height:58px; border:1px solid var(--line); border-radius:15px; color:#526177; background:#fff; font-weight:950; }
    .tab.active { border-color:var(--blue); color:#fff; background:var(--blue); }
    .tab-count { display:inline-grid; place-items:center; min-width:26px; height:26px; border-radius:999px; margin-left:5px; padding:0 7px; color:#4d5b70; background:#e7edf5; font-size:.72rem; }
    .tab.active .tab-count { color:#fff; background:rgba(255,255,255,.22); }
    main { max-width:1280px; margin:0 auto; padding:7px 20px 30px; }
    .view { display:none; }.view.active { display:block; }
    .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:14px; margin:10px 0 14px; }
    .page-head h2 { margin:0; font-size:1.55rem; }
    .page-actions { display:flex; align-items:end; flex-wrap:wrap; gap:9px; }
    .date-field { width:190px; }
    label { display:block; margin-bottom:5px; color:#46546a; font-size:.76rem; font-weight:900; }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:11px; margin-bottom:14px; }
    .stat { border:1px solid var(--line); border-radius:19px; padding:15px; background:#fff; box-shadow:0 6px 20px rgba(20,38,70,.04); }
    .stat span { display:block; color:var(--muted); font-size:.72rem; font-weight:900; }
    .stat strong { display:block; margin-top:2px; font-size:1.85rem; line-height:1.25; }
    .stat.blue { border-color:#a9c5fb; background:#f2f7ff; }.stat.red { border-color:#f0b3ba; background:#fff4f5; }.stat.green { border-color:#9fd6c2; background:#f0faf6; }
    .panel { border:1px solid var(--line); border-radius:21px; padding:18px; background:#fff; box-shadow:0 7px 23px rgba(20,38,70,.05); }
    .panel h3 { margin:0; font-size:1.15rem; }
    .list { display:grid; gap:11px; margin-top:13px; }
    .item { border:1px solid var(--line); border-radius:17px; padding:15px; background:#fafbfd; }
    .item-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .item-name { font-weight:950; font-size:1.05rem; }
    .item-meta { margin-top:3px; color:var(--muted); font-size:.82rem; }
    .badge { display:inline-flex; align-items:center; white-space:nowrap; border-radius:999px; padding:5px 11px; font-size:.7rem; font-weight:950; color:#536176; background:#e7edf5; }
    .badge.green { color:#066443; background:#e1f7ee; }.badge.red { color:#a32331; background:#ffeaed; }.badge.amber { color:#805300; background:#fff0c5; }.badge.blue { color:#174dac; background:#e5efff; }.badge.purple { color:#60389d; background:#efe7fb; }
    .actions { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:9px; margin-top:13px; }
    .actions .btn { min-height:58px; }
    .filters { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; margin-bottom:14px; }
    .search-row { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; margin-bottom:13px; }
    .customer-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .customer-card { border:1px solid var(--line); border-radius:18px; padding:16px; background:#fafbfd; }
    .ticket { display:inline-block; margin-top:7px; border-radius:11px; padding:4px 10px; color:#075f43; background:#e0f7ed; font-weight:950; }
    .empty,.loading { border:1px dashed #c6cfdb; border-radius:16px; padding:30px 12px; text-align:center; color:var(--muted); background:#fafbfd; }
    .toast { position:fixed; right:20px; bottom:20px; z-index:120; max-width:500px; border-radius:15px; padding:14px 18px; color:#fff; background:var(--green); box-shadow:0 14px 44px rgba(0,0,0,.25); font-weight:950; }
    @media (max-width:850px) { html{font-size:17px}.stats{grid-template-columns:1fr 1fr}.customer-grid{grid-template-columns:1fr}.page-head{align-items:flex-start}.actions{grid-template-columns:1fr 1fr}.header-actions .pc-link{display:none} }
    @media (max-width:620px) { .header-inner{padding:12px}.tabs{top:76px;padding:9px 10px;gap:5px}.tab{min-height:54px;padding:6px;font-size:.82rem}.tab-count{display:none}main{padding:6px 10px 24px}.page-head{display:block}.page-actions{margin-top:10px}.filters{grid-template-columns:1fr 1fr}.filters .btn{grid-column:1/-1}.date-field{width:100%}.actions{grid-template-columns:1fr}.panel{padding:14px} }
  </style>
</head>
<body>
  <div class="gate" id="loginGate">
    <div class="gate-card">
      <p class="brand">DPRO PERSONAL GYM LINE</p>
      <h1>iPad受付画面</h1>
      <p class="sub">管理コードを入力してください。営業デモURLでは1234を自動設定します。</p>
      <div class="auth-row"><input id="adminCode" type="password" inputmode="numeric" autocomplete="current-password" placeholder="管理コード"><button class="btn btn-soft" type="button" onclick="clearAdminCode()">削除</button></div>
      <button class="btn btn-blue btn-full" id="loginButton" type="button" onclick="login()">受付画面を開く</button>
      <p class="gate-message" id="loginMessage"></p>
    </div>
  </div>

  <div class="hidden" id="app">
    <header class="header"><div class="header-inner"><div><p class="brand">DPRO PERSONAL GYM LINE</p><h1 id="facilityName">iPad受付</h1></div><div class="header-actions"><button class="btn btn-soft pc-link" type="button" onclick="window.open('dashboard.html?demo=1','_blank')">PC管理</button><button class="btn btn-soft" type="button" onclick="reloadCurrent()">再読込</button><button class="btn btn-red" type="button" onclick="logout()">管理コード削除</button></div></div></header>

    <nav class="tabs" aria-label="管理メニュー">
      <button class="tab active" data-view="today" type="button" onclick="showView('today')">本日の受付 <span class="tab-count" id="todayCount">-</span></button>
      <button class="tab" data-view="schedule" type="button" onclick="showView('schedule')">予約一覧 <span class="tab-count" id="scheduleCount">-</span></button>
      <button class="tab" data-view="customers" type="button" onclick="showView('customers')">会員検索</button>
      <button class="tab" data-view="inquiries" type="button" onclick="showView('inquiries')">相談 <span class="tab-count" id="inquiryCount">-</span></button>
    </nav>

    <main>
      <section class="view active" id="view-today">
        <div class="page-head"><div><h2>本日の受付</h2><p class="sub" id="todayLabel">来店から完了まで、順番にタップします。</p></div><div class="page-actions"><div class="date-field"><label for="dashboardDate">表示日</label><input id="dashboardDate" type="date"></div><button class="btn btn-blue" type="button" onclick="loadDashboard()">表示</button><button class="btn btn-dark" type="button" onclick="prepareDemo()">営業前DEMO準備</button></div></div>
        <div class="stats"><div class="stat blue"><span>予約</span><strong id="statReservations">-</strong></div><div class="stat red"><span>承認待ち</span><strong id="statPending">-</strong></div><div class="stat"><span>相談</span><strong id="statInquiries">-</strong></div><div class="stat green"><span>残り1回以下</span><strong id="statLowTickets">-</strong></div></div>
        <div class="panel"><h3>予約と進行状況</h3><p class="sub">「来店」→「開始」→「完了・回数減算」の順で更新します。</p><div class="list" id="todayReservations"></div></div>
      </section>

      <section class="view" id="view-schedule">
        <div class="page-head"><div><h2>予約一覧</h2><p class="sub">期間と状態を選んで確認します。</p></div></div>
        <div class="panel"><div class="filters"><div><label for="scheduleFrom">開始日</label><input id="scheduleFrom" type="date"></div><div><label for="scheduleStatus">状態</label><select id="scheduleStatus"><option value="">すべて</option><option value="requested">承認待ち</option><option value="confirmed">予約確定</option><option value="arrived">来店済み</option><option value="in_session">トレーニング中</option><option value="completed">完了</option><option value="cancel_requested">キャンセル希望</option><option value="change_requested">変更希望</option><option value="cancelled">キャンセル</option><option value="no_show">未来店</option></select></div><button class="btn btn-blue" type="button" onclick="loadSchedule()">表示</button></div><div class="list" id="scheduleList"></div></div>
      </section>

      <section class="view" id="view-customers">
        <div class="page-head"><div><h2>会員検索</h2><p class="sub">氏名・電話番号・会員番号で検索できます。</p></div></div>
        <div class="panel"><div class="search-row"><input id="customerQuery" type="search" placeholder="氏名・電話番号・会員番号"><button class="btn btn-blue" type="button" onclick="loadCustomers()">検索</button></div><div class="customer-grid" id="customerList"></div></div>
      </section>

      <section class="view" id="view-inquiries">
        <div class="page-head"><div><h2>相談・連絡</h2><p class="sub">未対応から順に確認します。</p></div><div class="page-actions"><button class="btn btn-blue" type="button" onclick="loadInquiries()">再読込</button></div></div>
        <div class="panel"><div class="list" id="inquiryList"></div></div>
      </section>
    </main>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="config.js"></script>
  <script>
    const CONFIG=window.DPRO_GYM_CONFIG,API=String(CONFIG.workerBaseUrl||'').replace(/\/$/,''),FACILITY=CONFIG.facilityCode;
    const params=new URLSearchParams(location.search);const state={adminKey:'',view:'today',dashboard:null,schedule:[],customers:[],inquiries:[],facilityData:null};
    document.addEventListener('DOMContentLoaded',()=>{const today=todayYmd();valSet('dashboardDate',today);valSet('scheduleFrom',today);if(params.get('demo')==='1'){valSet('adminCode',CONFIG.demoAdminCode||'1234');login();}});
    async function login(){const key=val('adminCode');if(!key)return setText('loginMessage','管理コードを入力してください。');const button=document.getElementById('loginButton');button.disabled=true;button.textContent='確認中…';try{state.adminKey=key;const [dashboard,facility]=await Promise.all([api(`/api/admin/dashboard?facility_code=${FACILITY}&date=${todayYmd()}`),publicApi(`/api/public/facility?facility_code=${FACILITY}`)]);state.facilityData=facility;state.dashboard=dashboard;setText('facilityName',`${dashboard.facility.facility_name}｜iPad受付`);document.getElementById('loginGate').classList.add('hidden');document.getElementById('app').classList.remove('hidden');renderDashboard(dashboard);}catch(error){state.adminKey='';setText('loginMessage',error.message);}finally{button.disabled=false;button.textContent='受付画面を開く';}}
    function clearAdminCode(){valSet('adminCode','');document.getElementById('adminCode').focus();}function logout(){state.adminKey='';clearAdminCode();document.getElementById('app').classList.add('hidden');document.getElementById('loginGate').classList.remove('hidden');}
    function showView(view){state.view=view;document.querySelectorAll('.view').forEach(element=>element.classList.toggle('active',element.id===`view-${view}`));document.querySelectorAll('.tab').forEach(element=>element.classList.toggle('active',element.dataset.view===view));if(view==='schedule')loadSchedule();if(view==='customers')loadCustomers();if(view==='inquiries')loadInquiries();}
    function reloadCurrent(){if(state.view==='today')loadDashboard();else if(state.view==='schedule')loadSchedule();else if(state.view==='customers')loadCustomers();else loadInquiries();}
    async function loadDashboard(){const date=val('dashboardDate')||todayYmd();const list=document.getElementById('todayReservations');list.innerHTML=loading();try{const data=await api(`/api/admin/dashboard?facility_code=${FACILITY}&date=${date}`);state.dashboard=data;renderDashboard(data);}catch(error){list.innerHTML=empty(error.message);toast(error.message,true);}}
    function renderDashboard(data){const counts=data.counts||{};setText('todayLabel',`${formatDate(data.date)}の予約を表示中`);setText('statReservations',counts.reservations);setText('statPending',counts.pending);setText('statInquiries',counts.open_inquiries);setText('statLowTickets',counts.low_tickets);setText('todayCount',counts.reservations);setText('scheduleCount',counts.reservations);setText('inquiryCount',counts.open_inquiries);document.getElementById('todayReservations').innerHTML=data.reservations?.length?data.reservations.map(reservationCard).join(''):empty('この日の予約はありません。');}
    async function loadSchedule(){const from=val('scheduleFrom')||todayYmd(),status=val('scheduleStatus'),query=new URLSearchParams({facility_code:FACILITY,date_from:from,date_to:addDaysYmd(from,6)});if(status)query.set('status',status);const list=document.getElementById('scheduleList');list.innerHTML=loading();try{const data=await api(`/api/admin/reservations?${query}`);state.schedule=data.reservations||[];setText('scheduleCount',state.schedule.length);list.innerHTML=state.schedule.length?state.schedule.map(reservationCard).join(''):empty('条件に一致する予約はありません。');}catch(error){list.innerHTML=empty(error.message);}}
    function reservationCard(reservation){const customer=reservation.customer||{},status=statusInfo(reservation.status);return `<article class="item"><div class="item-top"><div><div class="item-name">${esc(formatDateTime(reservation.start_at))}　${esc(customer.full_name||'会員未取得')}</div><div class="item-meta">${esc(serviceName(reservation.service_code))} / ${esc(trainerName(reservation.trainer_code))}<br>${esc(customer.customer_no||'')}　${esc(customer.phone||'電話未登録')}　残り${Number(customer.ticket_remaining||0)}回</div></div><span class="badge ${status.color}">${esc(status.label)}</span></div><div class="actions">${statusButtons(reservation)}</div></article>`;}
    function statusButtons(reservation){const id=attr(reservation.id);if(reservation.status==='requested')return `<button class="btn btn-green" type="button" onclick="changeReservationStatus('${id}','confirmed')">予約確定</button><button class="btn btn-red" type="button" onclick="changeReservationStatus('${id}','cancelled')">取消</button>`;if(reservation.status==='confirmed')return `<button class="btn btn-blue" type="button" onclick="changeReservationStatus('${id}','arrived')">来店</button><button class="btn btn-red" type="button" onclick="changeReservationStatus('${id}','no_show')">未来店</button>`;if(reservation.status==='arrived')return `<button class="btn btn-purple" type="button" onclick="changeReservationStatus('${id}','in_session')">トレーニング開始</button>`;if(reservation.status==='in_session')return `<button class="btn btn-green" type="button" onclick="changeReservationStatus('${id}','completed')">完了・回数減算</button>`;if(['cancel_requested','change_requested'].includes(reservation.status))return `<button class="btn btn-green" type="button" onclick="changeReservationStatus('${id}','confirmed')">確定に戻す</button><button class="btn btn-red" type="button" onclick="changeReservationStatus('${id}','cancelled')">キャンセル確定</button>`;return '<button class="btn btn-soft" type="button" disabled>更新済み</button>';}
    async function changeReservationStatus(id,status){if(status==='completed'&&!confirm('セッションを完了し、回数券対象メニューは1回減算します。よろしいですか？'))return;try{await api('/api/admin/reservations/status',{method:'POST',body:{facility_code:FACILITY,reservation_id:id,status,created_by:'ipad'}});toast('予約状態を更新しました。');if(state.view==='today')await loadDashboard();else await loadSchedule();}catch(error){toast(error.message,true);}}
    async function loadCustomers(){const query=val('customerQuery'),list=document.getElementById('customerList');list.innerHTML=loading();try{const data=await api(`/api/admin/customers?facility_code=${FACILITY}&q=${encodeURIComponent(query)}`);state.customers=data.customers||[];list.innerHTML=state.customers.length?state.customers.map(customerCard).join(''):empty('会員が見つかりません。');}catch(error){list.innerHTML=empty(error.message);}}
    function customerCard(customer){return `<article class="customer-card"><div class="item-top"><div><div class="item-name">${esc(customer.full_name)}</div><div class="item-meta">${esc(customer.customer_no)}　${esc(customer.phone||'電話未登録')}<br>${esc(customer.plan_name||'プラン未設定')} / 最終来店 ${esc(customer.last_visit_on||'-')}</div></div><span class="badge ${customer.status==='member'?'green':'amber'}">${esc(customerStatus(customer.status))}</span></div><span class="ticket">回数券 残り${Number(customer.ticket_remaining||0)}回</span><div class="actions"><button class="btn btn-soft" type="button" onclick="changeTickets('${attr(customer.id)}',-1)">-1回</button><button class="btn btn-green" type="button" onclick="changeTickets('${attr(customer.id)}',1)">+1回</button></div></article>`;}
    async function changeTickets(customerId,amount){const customer=state.customers.find(item=>item.id===customerId);if(!customer)return;if(!confirm(`${customer.full_name} 様の回数券を ${amount>0?'+':''}${amount} 回変更します。よろしいですか？`))return;try{await api('/api/admin/customers/tickets',{method:'POST',body:{facility_code:FACILITY,customer_id:customerId,change_amount:amount,reason:'iPad受付で回数調整'}});toast('回数券を更新しました。');loadCustomers();}catch(error){toast(error.message,true);}}
    async function loadInquiries(){const list=document.getElementById('inquiryList');list.innerHTML=loading();try{const data=await api(`/api/admin/inquiries?facility_code=${FACILITY}`);state.inquiries=data.inquiries||[];setText('inquiryCount',state.inquiries.filter(item=>item.status!=='closed').length);list.innerHTML=state.inquiries.length?state.inquiries.map(inquiryCard).join(''):empty('相談・連絡はありません。');}catch(error){list.innerHTML=empty(error.message);}}
    function inquiryCard(inquiry){const customer=inquiry.customer||{},status=inquiry.status==='closed'?{label:'完了',color:'green'}:inquiry.status==='in_progress'?{label:'対応中',color:'blue'}:{label:'未対応',color:'red'};return `<article class="item"><div class="item-top"><div><div class="item-name">${esc(customer.full_name||'会員')}｜${esc(inquiryType(inquiry.inquiry_type))}</div><div class="item-meta">${esc(formatDateTime(inquiry.created_at))}<br>${esc(inquiry.message)}</div></div><span class="badge ${status.color}">${status.label}</span></div><div class="actions"><button class="btn btn-blue" type="button" onclick="updateInquiry('${attr(inquiry.id)}','in_progress')">対応中にする</button><button class="btn btn-green" type="button" onclick="updateInquiry('${attr(inquiry.id)}','closed')">対応完了</button></div></article>`;}
    async function updateInquiry(id,status){try{await api('/api/admin/inquiries/status',{method:'POST',body:{facility_code:FACILITY,inquiry_id:id,status}});toast('相談状態を更新しました。');loadInquiries();}catch(error){toast(error.message,true);}}
    async function prepareDemo(){if(!confirm('DPRO パーソナルジムのデモデータだけを今日基準で作り直します。実行しますか？'))return;try{const data=await api('/api/admin/demo-prepare',{method:'POST',headers:{'X-Demo-Confirm':'DEMOパーソナルジムだけ実行'},body:{facility_code:FACILITY,confirm_text:'DEMOパーソナルジムだけ実行'}});toast(`DEMO準備完了：会員${data.demo_data.customers}件・予約${data.demo_data.reservations}件`);loadDashboard();}catch(error){toast(error.message,true);}}
    async function api(path,opt={}){return request(path,{...opt,headers:{'Content-Type':'application/json','X-Admin-Key':state.adminKey,...(opt.headers||{})}});}async function publicApi(path,opt={}){return request(path,{...opt,headers:{'Content-Type':'application/json',...(opt.headers||{})}});}async function request(path,opt){const response=await fetch(`${API}${path}`,{method:opt.method||'GET',headers:opt.headers,body:opt.body?JSON.stringify(opt.body):undefined,cache:'no-store'}),text=await response.text();let data;try{data=text?JSON.parse(text):{};}catch(_){data={message:text};}if(!response.ok||data.ok===false)throw new Error(data.message||`HTTP ${response.status}`);return data;}
    function statusInfo(status){return ({requested:{label:'承認待ち',color:'amber'},confirmed:{label:'予約確定',color:'green'},arrived:{label:'来店済み',color:'blue'},in_session:{label:'トレーニング中',color:'purple'},completed:{label:'完了',color:'green'},change_requested:{label:'変更希望',color:'amber'},cancel_requested:{label:'キャンセル希望',color:'red'},cancelled:{label:'キャンセル',color:'red'},no_show:{label:'未来店',color:'red'}})[status]||{label:status||'-',color:''};}
    function serviceName(code){return state.facilityData?.services?.find(item=>item.service_code===code)?.service_name||code||'-';}function trainerName(code){return code?(state.facilityData?.trainers?.find(item=>item.trainer_code===code)?.trainer_name||code):'おまかせ';}function customerStatus(status){return ({trial:'体験',member:'入会済',continuation:'継続相談',inactive:'休眠',withdrawn:'退会'})[status]||status;}function inquiryType(type){return ({general:'一般相談',reservation:'予約相談',health:'体調相談',continuation:'継続相談',other:'その他'})[type]||type;}
    function toast(message,isError=false){const element=document.getElementById('toast');element.textContent=message;element.style.background=isError?'var(--red)':'var(--green)';element.classList.remove('hidden');clearTimeout(toast.timer);toast.timer=setTimeout(()=>element.classList.add('hidden'),3500);}function empty(message){return `<div class="empty">${esc(message)}</div>`;}function loading(){return '<div class="loading">読み込んでいます…</div>';}function val(id){return document.getElementById(id).value.trim();}function valSet(id,value){document.getElementById(id).value=value??'';}function setText(id,value){document.getElementById(id).textContent=value??'-';}
    function todayYmd(){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());}function addDaysYmd(ymd,days){const date=new Date(`${ymd}T12:00:00+09:00`);date.setUTCDate(date.getUTCDate()+days);return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit'}).format(date);}function formatDate(value){return new Intl.DateTimeFormat('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',weekday:'short'}).format(new Date(`${value}T00:00:00+09:00`));}function formatDateTime(value){if(!value)return'-';return new Intl.DateTimeFormat('ja-JP',{timeZone:'Asia/Tokyo',month:'numeric',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'}).format(new Date(value));}function esc(value){return String(value??'').replace(/[&<>"']/g,character=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[character]);}function attr(value){return esc(value);}
  </script>
