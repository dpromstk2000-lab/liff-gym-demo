<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約申し込み</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        /* 30分刻みで入力させるための設定 */
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2d3436; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">新規予約申し込み</h2>
    <div class="form-group">
        <label>希望日時 (30分単位)</label>
        <input type="datetime-local" id="datetimeInput" step="1800" required>
    </div>
    <button onclick="submitReservation()">予約を送信する</button>
</div>

<script>
    const supabaseUrl = 'https://cbknucemarcpbscirzyv.supabase.co';
    const supabaseKey = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // 【重要】今日の日付を最小値として設定
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('datetimeInput').min = now.toISOString().slice(0, 16);

    async function init() {
        await liff.init({ liffId: "2010362463-80AFWCcm" });
        if (!liff.isLoggedIn()) liff.login();
    }

    async function submitReservation() {
        const input = document.getElementById('datetimeInput').value;
        if (!input) return alert("日時を選択してください");

        // 30分単位のチェック（分が00か30以外は弾く）
        const minutes = new Date(input).getMinutes();
        if (minutes !== 0 && minutes !== 30) return alert("時間は30分単位で選択してください（例：13:00、13:30）");

        const profile = await liff.getProfile();
        
        const { error } = await supabaseClient
            .from('gym_profiles')
            .update({ 
                preferred_datetime: input,
                reservation_status: 'pending' 
            })
            .eq('line_user_id', profile.userId);

        if (error) return alert("予約エラー: " + error.message);
        
        alert("予約を申し込みました！");
        window.location.href = 'member.html';
    }

    init();
</script>
</body>
</html>
