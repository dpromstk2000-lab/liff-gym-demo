<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=index.html">
  <title>DPRO パーソナルジム｜予約画面へ移動</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root { --navy:#13213c; --blue:#2563eb; --text:#182235; --muted:#617086; --line:#d6dfeb; --bg:#eef2f7; }
    * { box-sizing:border-box; }
    html { font-size:18px; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:20px; color:var(--text); background:linear-gradient(135deg,var(--bg),#fff); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.65; }
    main { width:min(620px,100%); border:1px solid var(--line); border-radius:24px; padding:28px; text-align:center; background:#fff; box-shadow:0 20px 60px rgba(20,38,70,.12); }
    .brand { margin:0; color:var(--blue); font-size:.72rem; font-weight:950; letter-spacing:.15em; }
    h1 { margin:7px 0 0; color:var(--navy); font-size:1.55rem; line-height:1.4; }
    p { margin:9px 0 0; color:var(--muted); }
    a { display:inline-grid; place-items:center; min-height:56px; margin-top:20px; border-radius:15px; padding:10px 22px; color:#fff; background:var(--blue); text-decoration:none; font-weight:950; }
  </style>
</head>
<body>
  <main>
    <p class="brand">DPRO PERSONAL GYM LINE</p>
    <h1>新しい予約画面へ移動します</h1>
    <p>自動で移動しない場合は、下のボタンを押してください。</p>
    <a id="bookingLink" href="index.html">予約画面を開く</a>
  </main>
  <script>
    (() => {
      const target = new URL('index.html', window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      document.getElementById('bookingLink').href = target.href;
      window.location.replace(target.href);
    })();
  </script>
</body>
</html>
