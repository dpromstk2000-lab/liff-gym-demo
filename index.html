<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM 無料体験予約</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 font-sans antialiased text-white">
    <div class="max-w-md mx-auto bg-gray-800 min-h-screen flex flex-col shadow-2xl">
        <div class="bg-black text-yellow-500 text-center py-4 font-black tracking-widest border-b border-yellow-500">DPRO GYM × DEMO</div>
        <div class="p-6 flex-grow">
            <div class="w-full bg-gray-700 h-2 rounded-full mb-6"><div id="progress-bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-300" style="width: 20%"></div></div>
            <div id="status-message" class="text-center text-yellow-400 font-bold my-2 hidden"></div>

            <!-- ステップ1~5（そのまま） -->
            <div id="step1" class="space-y-4">
                <h3 class="text-lg font-bold text-yellow-400">Q1. 年齢層と性別</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="selectQ1('20代', '男性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">20代 男性</button>
                    <button type="button" onclick="selectQ1('20代', '女性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">20代 女性</button>
                    <button type="button" onclick="selectQ1('30代', '男性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">30代 男性</button>
                    <button type="button" onclick="selectQ1('30代', '女性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">30代 女性</button>
                    <button type="button" onclick="selectQ1('40代', '男性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">40代 男性</button>
                    <button type="button" onclick="selectQ1('40代', '女性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">40代 女性</button>
                    <button type="button" onclick="selectQ1('50代', '男性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">50代 男性</button>
                    <button type="button" onclick="selectQ1('50代', '女性')" class="bg-gray-700 py-3 rounded-xl font-bold text-sm">50代 女性</button>
                </div>
            </div>

            <div id="step2" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q2. 目的</h3>
                <button type="button" onclick="selectQ2('ダイエット')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">🔥 ダイエット</button>
                <button type="button" onclick="selectQ2('筋力アップ')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">💪 筋力アップ</button>
                <button type="button" onclick="selectQ2('健康維持')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4">🏃‍♂️ 健康維持</button>
            </div>

            <div id="step3" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q3. 目標</h3>
                <button type="button" onclick="selectQ3('3ヶ月で-5kg')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">🎯 3ヶ月で-5kg</button>
                <button type="button" onclick="selectQ3('サイズダウン')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4">👗 サイズダウン</button>
            </div>

            <div id="step4" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q4. お悩み</h3>
                <textarea id="custom-memo" rows="2" class="w-full bg-gray-700 rounded-xl p-3"></textarea>
                <button type="button" onclick="selectQ4()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">次へ</button>
            </div>

            <div id="step5" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q5. 検討時期</h3>
                <button type="button" onclick="selectQ5('すぐ入会')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">✨ すぐ入会</button>
                <button type="button" onclick="selectQ5('じっくり考えたい')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4">🔍 じっくり考えたい</button>
            </div>

            <!-- ★追加：希望日時選択ステップ -->
            <div id="step6" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q6. 希望日時</h3>
                <input type="datetime-local" id="preferred_datetime" class="w-full bg-gray-700 text-white p-4 rounded-xl border border-gray-600">
                <button id="submit-btn" onclick="submitData()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl">予約を確定する</button>
            </div>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2010341851-Qez3SffP'; 
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        const WORKERS_URL = 'https://dpro-gym-webhook.dpromstk2000.workers.dev'; 

        let answers = { age_group: '', gender: '', purpose: '', target_goal: '', status: '', preferred_datetime: '' };
        let lineUserId = 'demo_' + Math.floor(Math.random() * 100000);
        let displayName = '体験デモ ゲスト様';
        let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function selectQ1(age, gender) { answers.age_group = age; answers.gender = gender; document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
        function selectQ2(val) { answers.purpose = val; document.getElementById('step2').classList.add('hidden'); document.getElementById('step3').classList.remove('hidden'); }
        function selectQ3(val) { answers.target_goal = val; document.getElementById('step3').classList.add('hidden'); document.getElementById('step4').classList.remove('hidden'); }
        function selectQ4() { answers.status = document.getElementById('custom-memo').value; document.getElementById('step4').classList.add('hidden'); document.getElementById('step5').classList.remove('hidden'); }
        function selectQ5(val) { answers.target_goal += " / 時期: " + val; document.getElementById('step5').classList.add('hidden'); document.getElementById('step6').classList.remove('hidden'); }

        async function submitData() {
            answers.preferred_datetime = document.getElementById('preferred_datetime').value;
            await supabaseClient.from('gym_profiles').upsert({
                line_user_id: lineUserId,
                display_name: displayName,
                age_group: answers.age_group,
                gender: answers.gender,
                purpose: answers.purpose,
                target_goal: answers.target_goal,
                status: answers.status,
                preferred_datetime: answers.preferred_datetime // 新規列に保存
            });
            alert("予約完了しました！");
            liff.closeWindow();
        }
    </script>
</body>
</html>
