<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM 無料体験予約</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 font-sans antialiased text-white">

    <div class="max-w-md mx-auto bg-gray-800 min-h-screen flex flex-col justify-between shadow-2xl">
        
        <div class="bg-black text-yellow-500 text-center py-4 font-black tracking-widest border-b border-yellow-500">
            DPRO GYM × DEMO
        </div>

        <div class="p-6 flex-grow">
            
            <div class="w-full bg-gray-700 h-2 rounded-full mb-6">
                <div id="progress-bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-300" style="width: 20%"></div>
            </div>

            <div id="status-message" class="text-center text-yellow-400 font-bold my-2 hidden"></div>

            <div id="step1" class="space-y-4">
                <h3 class="text-lg font-bold text-yellow-400">Q1. あなたの年齢層と性別を教えてください</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="selectQ1('20代〜30代', '男性')" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold transition block text-center w-full text-sm">20代〜30代 男性</button>
                    <button type="button" onclick="selectQ1('20代〜30代', '女性')" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold transition block text-center w-full text-sm">20代〜30代 女性</button>
                    <button type="button" onclick="selectQ1('40代〜50代', '男性')" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold transition block text-center w-full text-sm">40代〜50代 男性</button>
                    <button type="button" onclick="selectQ1('40代〜50代', '女性')" class="bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold transition block text-center w-full text-sm">40代〜50代 女性</button>
                </div>
                <div class="pt-1">
                    <button type="button" onclick="selectQ1('60代以上', '回答なし')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-3 rounded-xl font-bold transition block text-center text-sm">👵👴 60代以上の方はこちら</button>
                </div>
            </div>

            <div id="step2" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q2. 今回、無料体験に応募された一番の目的は何ですか？</h3>
                <div class="space-y-3">
                    <button type="button" onclick="selectQ2('ダイエット・シェイプアップ')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">🔥 ダイエット・シェイプアップ</button>
                    <button type="button" onclick="selectQ2('筋力アップ・ボディメイク')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">💪 筋力アップ・ボディメイク</button>
                    <button type="button" onclick="selectQ2('運動不足の解消・健康維持')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">🏃‍♂️ 運動不足の解消・健康維持</button>
                </div>
            </div>

            <div id="step3" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q3. 目標とする時期と理想の姿を教えてください</h3>
                <div class="space-y-3">
                    <button type="button" onclick="selectQ3('3ヶ月以内にマイナス5kg')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">🎯 3ヶ月以内にマイナス5kg</button>
                    <button type="button" onclick="selectQ3('夏（半年以内）までに服を落とす')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">👗 夏までに服のサイズを落とす</button>
                    <button type="button" onclick="selectQ3('まずは週2回の運動習慣定着')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">📅 まずは週2回の運動習慣定着</button>
                </div>
            </div>

            <div id="step4" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q4. 現在、最も悩んでいることは何ですか？</h3>
                <div class="space-y-2">
                    <button type="button" onclick="selectQ4('過去にジムに通ったが続かなかった')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-3 rounded-xl font-bold text-left px-4 transition block text-sm">❌ 過去にジムに通ったが続かなかった</button>
                    <button type="button" onclick="selectQ4('マシンの使い方が分からず不安')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-3 rounded-xl font-bold text-left px-4 transition block text-sm">❌ マシンの使い方が分からず不安</button>
                    <button type="button" onclick="selectQ4('リバウンドを繰り返してしまう')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-3 rounded-xl font-bold text-left px-4 transition block text-sm">❌ リバウンドを繰り返してしまう</button>
                </div>
                
                <div class="pt-2 border-t border-gray-700 mt-2">
                    <label class="block text-xs font-bold text-gray-400 mb-1">📝 その他（具体的なお悩みや部位など自由に入力可能）</label>
                    <textarea id="custom-memo" rows="2" class="w-full bg-gray-700 border border-gray-600 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-yellow-500 placeholder-gray-500" placeholder="例: 産後太りを解消したい、腰痛がある、など"></textarea>
                    <button type="button" onclick="submitQ4Memo()" class="w-full mt-2 bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-600 transition text-sm">上記のその他・メモ内容で次へ進む ➔</button>
                </div>
            </div>

            <div id="step5" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q5. 本日の体験を受けて、入会を検討される時期はいつ頃ですか？</h3>
                <div class="space-y-3">
                    <button type="button" onclick="selectQ5('条件が合えば今日すぐにでも')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">✨ 条件が合えば今日すぐにでも入会したい</button>
                    <button type="button" onclick="selectQ5('1〜2週間以内にスタートしたい')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">⏱ 1〜2週間以内にスタートしたい</button>
                    <button type="button" onclick="selectQ5('まずは体験してからじっくり考えたい')" class="w-full bg-gray-700 hover:bg-yellow-500 hover:text-black py-4 rounded-xl font-bold text-left px-4 transition block">🔍 まずは体験してからじっくり考えたい</button>
                </div>
            </div>

        </div>

        <div class="p-4 bg-gray-900 border-t border-gray-700">
            <button id="submit-btn" disabled class="w-full bg-gray-600 text-gray-400 font-bold py-4 rounded-xl cursor-not-allowed transition block text-center">
                質問に回答してください
            </button>
        </div>

    </div>

    <script>
        const MY_LIFF_ID = '2010341851-Qez3SffP'; 
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 

        let answers = { age_group: '', gender: '', purpose: '', target_goal: '', status: '' };
        let lineUserId = 'demo_' + Math.floor(Math.random() * 100000);
        let displayName = '体験デモ ゲスト様';
        let supabaseClient = null;

        window.onload = async function() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                        auth: { persistSession: false, autoRefreshToken: false }
                    });
                }
            } catch (e) { console.error(e); }

            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId;
                    displayName = profile.displayName;
                }
            } catch (error) { console.log("デモモード稼働"); }

            const btn = document.getElementById('submit-btn');
            if (btn) btn.innerHTML = "質問に回答してください";
        };

        function selectQ1(age, gender) {
            answers.age_group = age;
            answers.gender = gender;
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '40%';
        }

        function selectQ2(value) {
            answers.purpose = value;
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '60%';
        }

        function selectQ3(value) {
            answers.target_goal = value;
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step4').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '80%';
        }

        function selectQ4(value) {
            answers.status = value;
            goToStep5();
        }

        function submitQ4Memo() {
            const memoVal = document.getElementById('custom-memo').value.trim();
            answers.status = memoVal ? "その他: " + memoVal : "未入力";
            goToStep5();
        }

        function goToStep5() {
            document.getElementById('step4').classList.add('hidden');
            document.getElementById('step5').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = '100%';
        }

        function selectQ5(value) {
            answers.target_goal += " / 検討時期: " + value;
            
            const btn = document.getElementById('submit-btn');
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = "回答を送信して予約を確定する";
                btn.classList.remove('bg-gray-600', 'text-gray-400', 'cursor-not-allowed');
                btn.classList.add('bg-yellow-500', 'text-black', 'hover:bg-yellow-600');
                btn.onclick = submitData;
            }
        }

        async function submitData() {
            const btn = document.getElementById('submit-btn');
            const statusMsg = document.getElementById('status-message');
            
            if(btn) btn.disabled = true;
            if(statusMsg) {
                statusMsg.classList.remove('hidden');
                statusMsg.innerHTML = "データベースに書き込んでいます...";
            }

            try {
                if (!supabaseClient) throw new Error("接続エラー");

                const { data, error } = await supabaseClient
                    .from('gym_profiles')
                    .upsert({
                        line_user_id: lineUserId,
                        display_name: displayName,
                        age_group: answers.age_group,
                        gender: answers.gender,
                        purpose: answers.purpose,
                        target_goal: answers.target_goal,
                        status: answers.status
                    }, { onConflict: 'line_user_id' });

                if (error) throw error;

                if(statusMsg) statusMsg.innerHTML = "送信成功！";
                alert(displayName + "様、体験予約アンケートが完了しました！\nSupabaseにリアルタイム保存されました。");
                
                if (typeof liff !== 'undefined' && liff.isInClient()) {
                    liff.closeWindow();
                }

            } catch (error) {
                if(statusMsg
