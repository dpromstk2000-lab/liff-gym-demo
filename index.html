<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM 無料体験予約</title>
    <!-- 画面をスマホ風に綺麗に整えるためのデザイン部品をお借りします -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- 全体を包むボックス -->
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md flex flex-col justify-between">
        
        <!-- ヘッダー部分 -->
        <div class="bg-black text-white text-center py-4 font-bold tracking-wider">
            DPRO GYM（ディープロ・ジム）
        </div>

        <!-- メインの質問エリア -->
        <div class="p-6 flex-grow">
            <h2 class="text-xl font-bold text-center text-gray-800 mb-6">1分で完了！無料体験予約フォーム</h2>
            
            <!-- ここに後で、年齢・性別・目的などの質問ボタンを作っていきます -->
            <p class="text-gray-600 text-center py-10">
                ここにアンケートの質問が順番に表示されます。
            </p>
        </div>

        <!-- 下部のボタンエリア -->
        <div class="p-4 bg-gray-50 border-t border-gray-200">
            <button class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                次へ進む
            </button>
        </div>

    </div>

</body>
</html>
