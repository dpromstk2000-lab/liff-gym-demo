<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM 無料体験予約</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 font-sans antialiased text-white">

    <div class="max-w-md mx-auto bg-gray-800 min-h-screen flex flex-col shadow-2xl">
        <div class="bg-black text-yellow-500 text-center py-4 font-black tracking-widest border-b border-yellow-500">DPRO GYM × DEMO</div>
        <div class="p-6 flex-grow">
            <div class="w-full bg-gray-700 h-2 rounded-full mb-6"><div id="progress-bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-300" style="width: 15%"></div></div>
            
            <div id="step1" class="space-y-4">
                <h3 class="text-lg font-bold text-yellow-400">Q1. 年齢層と性別</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button type="button" onclick="selectQ1('10代', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">10代 男性</button>
                    <button type="button" onclick="selectQ1('10代', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">10代 女性</button>
                    <button type="button" onclick="selectQ1('20代', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">20代 男性</button>
                    <button type="button" onclick="selectQ1('20代', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">20代 女性</button>
                    <button type="button" onclick="selectQ1('30代', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">30代 男性</button>
                    <button type="button" onclick="selectQ1('30代', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">30代 女性</button>
                    <button type="button" onclick="selectQ1('40代', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">40代 男性</button>
                    <button type="button" onclick="selectQ1('40代', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">40代 女性</button>
                    <button type="button" onclick="selectQ1('50代', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">50代 男性</button>
                    <button type="button" onclick="selectQ1('50代', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">50代 女性</button>
                    <button type="button" onclick="selectQ1('60代以上', '男性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">60代以上 男性</button>
                    <button type="button" onclick="selectQ1('60代以上', '女性')" class="bg-gray-700 py-2 rounded-lg font-bold text-xs">60代以上 女性</button>
                </div>
            </div>

            <div id="step2" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q2. 目的</h3>
                <button type="button" onclick="selectQ2('ダイエット')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">🔥 ダイエット・シェイプアップ</button>
                <button type="button" onclick="selectQ2('筋力アップ')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">💪 筋力アップ・ボディメイク</button>
                <button type="button" onclick="selectQ2('健康維持')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4">🏃‍♂️ 運動不足の解消・健康維持</button>
            </div>

            <div id="step3" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q3. 目標</h3>
                <button type="button" onclick="selectQ3('3ヶ月で-5kg')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">🎯 3ヶ月以内に-5kg達成したい</button>
                <button type="button" onclick="selectQ3('サイズダウン')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4 mb-2">👗 半年以内にサイズダウンしたい</button>
                <button type="button" onclick="selectQ3('運動習慣')" class="w-full bg-gray-700 py-4 rounded-xl font-bold text-left px-4">📅 1ヶ月で運動習慣を定着させたい</button>
            </div>

            <div id="step4" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q4. お悩み（その他も可）</h3>
                <button type="button" onclick="selectQ4('過去にジムが続かなかった')" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-left px-4">❌ 過去にジムに通ったが続かなかった</button>
                <button type="button" onclick="selectQ4('マシンの使い方が不安')" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-left px-4">❌ マシンの使い方が分からず不安</button>
                <button type="button" onclick="selectQ4('リバウンドが心配')" class="w-full bg-gray-700 py-3 rounded-xl font-bold text-left px-4">❌ リバウンドを繰り返してしまう</button>
                <div class="mt-4">
                    <textarea id="custom-memo" rows="2" placeholder="その他の悩み・ご要望があればこちらへ" class="w-full bg-gray-700 rounded-xl p-3 text-white border border-gray-600"></textarea>
                    <button type="button" onclick="submitQ4()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl mt-2">その他を入力して次へ</button>
                </div>
            </div>

            <div id="step5" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q5. 希望日</h3>
                <input type="date" id="date-picker" class="w-full bg-gray-700 p-4 rounded-xl border border-gray-600 text-white">
                <button type="button" onclick="confirmDate()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl mt-4">次へ</button>
            </div>

            <div id="step6" class="space-y-4 hidden"><h3 class="text-lg font-bold text-yellow-400">Q6. 希望時間（10:00 - 19:00）</h3>
                <select id="time-picker" class="w-full bg-gray-700 p-4 rounded-xl border border-gray-600 text-white"></select>
                <button id="submit-btn" onclick="submitData()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl mt-4">予約を確定する</button>
            </div>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = '2010341851-Qez3SffP'; 
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        
        let answers = { age_group: '', gender: '', purpose: '', target_goal: '', status: '', date: '' };
        let displayName = 'ゲスト様';
        let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = async () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-picker').setAttribute('min', today);
            const select = document.getElementById('time-picker');
            for (let h = 10; h < 19; h++) {
                select.innerHTML += `<option value="${h}:00">${h}:00</option><option value="${h}:30">${h}:30</option>`;
            }
            select.innerHTML += `<option value="19:00">19:00</option>`;
            try { await liff.init({ liffId: MY_LIFF_ID }); if (liff.isLoggedIn()) { const p = await liff.getProfile(); displayName = p.displayName; } } catch(e){}
        };

        function selectQ1(a, g) { answers.age_group = a; answers.gender = g; move(1, 2); }
        function selectQ2(v) { answers.purpose = v; move(2, 3); }
        function selectQ3(v) { answers.target_goal = v; move(3, 4); }
        function selectQ4(v) { answers.status = v; move(4, 5); }
        function submitQ4() { const text = document.getElementById('custom-memo').value; if(text) answers.status = text; move(4, 5); }
        function confirmDate() { answers.date = document.getElementById('date-picker').value; if(!answers.date) return alert('日付を選択してください'); move(5, 6); }
        
        function move(from, to) {
            document.getElementById('step'+from).classList.add('hidden');
            document.getElementById('step'+to).classList.remove('hidden');
            document.getElementById('progress-bar').style.width = (to * 16.6) + '%';
        }

        async function submitData() {
            const time = document.getElementById('time-picker').value;
            const fullDate = answers.date + ' ' + time;
            
            // 1. Supabaseへ保存
            await supabaseClient.from('gym_profiles').insert([{
                display_name: displayName,
                age_group: answers.age_group,
                gender: answers.gender,
                purpose: answers.purpose,
                target_goal: answers.target_goal,
                status: answers.status,
                preferred_datetime: fullDate
            }]);
            
            // 2. LINEへの自動返信
            try {
                await liff.sendMessages([{
                    type: 'text',
                    text: `【予約完了】\n${displayName}様、ご予約ありがとうございます。\n日時：${fullDate}\n目標：${answers.target_goal}\n内容を確認し、追ってご連絡いたします。`
                }]);
            } catch(e) { console.error("メッセージ送信失敗", e); }
            
            alert("予約が完了しました！");
            liff.closeWindow();
        }
    </script>
</body>
</html>
