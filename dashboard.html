<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM | トレーナー用ダッシュボード</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <header class="bg-black border-b border-yellow-500 py-4 px-6 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-black tracking-widest text-yellow-500">DPRO GYM</span>
            <span class="bg-yellow-500 text-black text-xs font-bold px-2 py-0.5 rounded">管理画面</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 text-sm text-gray-400">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                <span>リアルタイム自動接続中</span>
            </div>
            <button onclick="fetchProfiles()" class="bg-gray-800 hover:bg-gray-700 text-white text-xs font-bold py-2 px-3 rounded-lg border border-gray-700 transition">
                🔄 手動更新
            </button>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-lg flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-400 font-bold">総予約（体験回答数）</p>
                    <h3 id="total-count" class="text-4xl font-black text-yellow-400 mt-1">0名</h3>
                </div>
                <div class="text-3xl">🔥</div>
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-lg flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-400 font-bold">本日の新規回答</p>
                    <h3 id="today-count" class="text-4xl font-black text-green-400 mt-1">0名</h3>
                </div>
                <div class="text-3xl">✨</div>
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-lg flex items-center justify-between">
                <div>
                    <p class="text-sm text-gray-400 font-bold">最終同期時刻</p>
                    <h3 id="sync-time" class="text-lg font-bold text-gray-300 mt-3">--:--:--</h3>
                </div>
                <div class="text-3xl">⏱</div>
            </div>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-xl overflow-hidden">
            <div class="border-b border-gray-700 px-6 py-4 bg-gray-850 flex justify-between items-center">
                <h2 class="text-lg font-bold text-white flex items-center space-x-2">
                    <span>📋 体験カルテ・回答一覧</span>
                </h2>
                <span class="text-xs text-gray-400">※新しい回答があると一番上に自動追加されます</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-900 text-gray-400 text-xs uppercase font-bold border-b border-gray-700">
                            <th class="py-4 px-6">登録日時</th>
                            <th class="py-4 px-6">お客様名</th>
                            <th class="py-4 px-6">属性</th>
                            <th class="py-4 px-6">一番の目的</th>
                            <th class="py-4 px-6">目標・時期・検討具合</th>
                            <th class="py-4 px-6">現在のお悩み</th>
                        </tr>
                    </thead>
                    <tbody id="profile-table-body" class="divide-y divide-gray-700 text-sm">
                        <tr>
                            <td colspan="6" class="py-12 text-center text-gray-500 font-medium">データを読み込み中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <audio id="notice-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav" preload="auto"></audio>

    <script>
        // Supabase接続設定（完全に同期済み）
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        
        let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: false, autoRefreshToken: false }
        });

        // ページ起動時の処理
        window.onload = function() {
            fetchProfiles();      // 最初にデータを全部持ってくる
            listenRealtime();     // 常時監視の電波を張る
        };

        // 1. データをSupabaseから引っ張ってきて画面に表示する関数
        async function fetchProfiles() {
            try {
                const { data, error } = await supabaseClient
                    .from('gym_profiles')
                    .select('*')
                    .order('created_at', { ascending: false }); // 新しい順

                if (error) throw error;

                renderTable(data);
                updateCounters(data);
                
                // 最終更新時間を更新
                const now = new Date();
                document.getElementById('sync-time').innerText = now.toLocaleTimeString();

            } catch (err) {
                console.error("データ取得エラー:", err.message);
            }
        }

        // 2. 引っ張ってきたデータを綺麗にテーブル（表）にする関数
        function renderTable(profiles) {
            const tbody = document.getElementById('profile-table-body');
            if (!profiles || profiles.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-gray-500">まだ予約データがありません。</td></tr>`;
                return;
            }

            let html = '';
            profiles.forEach(p => {
                // 日付を日本の見やすい形に変換
                const date = p.created_at ? new Date(p.created_at).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '不明';
                
                html += `
                    <tr class="hover:bg-gray-750 transition duration-150">
                        <td class="py-4 px-6 text-gray-400 whitespace-nowrap">${date}</td>
                        <td class="py-4 px-6 font-bold text-white">${escapeHtml(p.display_name)}</td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <span class="bg-gray-700 px-2 py-1 rounded text-xs font-semibold text-gray-300">${escapeHtml(p.age_group)} / ${escapeHtml(p.gender)}</span>
                        </td>
                        <td class="py-4 px-6 font-medium text-yellow-400">${escapeHtml(p.purpose)}</td>
                        <td class="py-4 px-6 text-gray-200 max-w-xs">${escapeHtml(p.target_goal)}</td>
                        <td class="py-4 px-6 text-gray-300 max-w-xs bg-gray-850">${escapeHtml(p.status)}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // 3. 上部の数値（カウンター）を計算して書き換える関数
        function updateCounters(profiles) {
            document.getElementById('total-count').innerText = `${profiles.length}名`;
            
            // 本日の回答数を数える
            const todayStr = new Date().toDateString();
            const todayCount = profiles.filter(p => p.created_at && new Date(p.created_at).toDateString() === todayStr).length;
            document.getElementById('today-count').innerText = `${todayCount}名`;
        }

        // 🌟4. 【最重要】Supabaseのデータ追加をリアルタイムで「常時監視」する関数
        function listenRealtime() {
            supabaseClient
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'gym_profiles' },
                    (payload) => {
                        console.log('新しい回答をリアルタイム検知！', payload.new);
                        
                        // 1. 最新データを含めて表を再描画
                        fetchProfiles();
                        
                        // 2. トレーナーに知らせるため「ピコーン♪」と音を鳴らす
                        try {
                            const sound = document.getElementById('notice-sound');
                            if(sound) sound.play();
                        } catch (e) { console.log("音声再生にはブラウザの画面を一度クリックしておく必要があります"); }
                    }
                )
                .subscribe();
        }

        // 安全対策（文字化け・不正コード対策）
        function escapeHtml(str) {
            if(!str) return '未入力';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
