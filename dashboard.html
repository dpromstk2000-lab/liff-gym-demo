<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPRO GYM 無料体験予約</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 font-sans antialiased text-white">

    <div class="max-w-md mx-auto bg-gray-800 min-h-screen flex flex-col justify-between shadow-2xl">
        <div class="bg-black text-yellow-500 text-center py-4 font-black tracking-widest border-b border-yellow-500">DPRO GYM × DEMO</div>

        <div class="p-6 flex-grow">
            <div class="w-full bg-gray-700 h-2 rounded-full mb-6">
                <div id="progress-bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-300" style="width: 20%"></div>
            </div>

            <div id="step6" class="space-y-4 hidden">
                <h3 class="text-lg font-bold text-yellow-400">Q6. ご希望の体験日時を選択してください</h3>
                <input type="datetime-local" id="preferred_datetime" class="w-full bg-gray-700 text-white p-4 rounded-xl border border-gray-600 focus:outline-none focus:border-yellow-500">
                <button id="submit-btn" onclick="submitData()" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl hover:bg-yellow-600 transition">予約を確定する</button>
            </div>
        </div>
    </div>

    <script>
        // 設定値（元のコードのものをそのまま利用）
        const MY_LIFF_ID = '2010341851-Qez3SffP'; 
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        
        let answers = { age_group: '', gender: '', purpose: '', target_goal: '', status: '' };
        let displayName = 'ゲスト様'; // 初期値
        
        window.onload = async function() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    displayName = profile.displayName; // LINEのアカウント名を取得
                }
            } catch (err) { console.error("LIFF初期化エラー:", err); }
        };

        // 各ステップの関数（元のロジックを維持し、最後にstep6へ繋ぐ）
        function selectQ5(val) {
            answers.target_goal += " / 検討時期: " + val;
            document.getElementById('step5').classList.add('hidden');
            document.getElementById('step6').classList.remove('hidden'); // 日時入力へ
            document.getElementById('progress-bar').style.width = '100%';
        }

        async function submitData() {
            const datetime = document.getElementById('preferred_datetime').value;
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            await supabaseClient.from('gym_profiles').insert([{
                line_user_id: 'user_' + Date.now(), // 実際はprofile.userId
                display_name: displayName, // 正しくLINE名が入る
                age_group: answers.age_group,
                gender: answers.gender,
                purpose: answers.purpose,
                target_goal: answers.target_goal,
                status: answers.status,
                preferred_datetime: datetime // 日時保存
            }]);
            alert(displayName + "様、予約完了しました！");
            liff.closeWindow();
        }
    </script>
</body>
</html>
