<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DPRO GYM オーナーダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-yellow-500">予約・回数管理</h1>
        <button onclick="fetchReservations()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold px-4 py-2 rounded-lg text-sm">最新情報を取得</button>
    </header>

    <div id="data-container" class="grid gap-4">読み込み中...</div>

    <script>
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ステータス更新用
        async function updateStatus(id, newStatus) {
            const { error } = await sbClient.from('gym_profiles').update({ reservation_status: newStatus }).eq('id', id);
            if (error) return alert("失敗: " + error.message);
            fetchReservations();
        }

        // 回数更新用（ここが新機能！）
        async function updateCount(id, currentCount, delta) {
            const newCount = Math.max(0, (currentCount || 0) + delta);
            const { error } = await sbClient.from('gym_profiles').update({ remaining_count: newCount }).eq('id', id);
            if (error) return alert("失敗: " + error.message);
            fetchReservations();
        }

        async function fetchReservations() {
            const { data, error } = await sbClient.from('gym_profiles').select('*').order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('data-container').innerHTML = 'エラー: ' + error.message;
                return;
            }

            let html = '';
            data.forEach(row => {
                const status = row.reservation_status || 'pending';
                const statusColor = status === 'confirmed' ? 'bg-green-700' : (status === 'cancelled' ? 'bg-red-700' : 'bg-gray-700');
                
                html += `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-yellow-400">${row.display_name || 'ゲスト様'}</span>
                        <span class="${statusColor} px-2 py-1 rounded text-xs">${status}</span>
                    </div>
                    <div class="text-sm space-y-2 text-gray-300 border-t border-gray-700 pt-2">
                        <p>🗓 日時: ${row.preferred_datetime || '未設定'}</p>
                        <p>🎯 目的: ${row.target_goal || '-'}</p>
                        
                        <!-- 回数管理エリア -->
                        <div class="flex items-center gap-3 bg-gray-900 p-2 rounded">
                            <span>残り回数: <strong class="text-yellow-400 text-lg">${row.remaining_count || 0}</strong> 回</span>
                            <div class="flex gap-1">
                                <button onclick="updateCount('${row.id}', ${row.remaining_count}, -1)" class="bg-gray-600 hover:bg-gray-500 px-3 py-1 rounded font-bold">-</button>
                                <button onclick="updateCount('${row.id}', ${row.remaining_count}, 1)" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded font-bold">+</button>
                            </div>
                        </div>

                        <div class="flex gap-2 pt-2">
                            <button onclick="updateStatus('${row.id}', 'confirmed')" class="bg-green-600 hover:bg-green-500 px-3 py-1 rounded text-xs font-bold">OK(承認)</button>
                            <button onclick="updateStatus('${row.id}', 'cancelled')" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded text-xs font-bold">NO(却下)</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('data-container').innerHTML = html || '予約はありません。';
        }

        fetchReservations();
    </script>
</body>
</html>
