<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DPRO GYM オーナーダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-yellow-500">予約状況一覧</h1>
        <button onclick="fetchReservations()" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold px-4 py-2 rounded-lg text-sm">最新情報を取得</button>
    </header>

    <div id="data-container" class="grid gap-4">読み込み中...</div>

    <script>
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchReservations() {
            // 全ての項目を読み込むように調整
            const { data, error } = await sbClient
                .from('gym_profiles')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('data-container').innerHTML = 'エラー: ' + error.message;
                return;
            }

            let html = '';
            data.forEach(row => {
                // preferred_datetime を明示的に表示
                const dateTime = row.preferred_datetime || '日時未設定';
                
                html += `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-yellow-400">${row.display_name || 'ゲスト様'}</span>
                        <span class="font-bold text-white bg-gray-700 px-2 py-1 rounded text-sm">${dateTime}</span>
                    </div>
                    <div class="text-sm space-y-1 text-gray-300 border-t border-gray-700 pt-2">
                        <p>👤 属性: ${row.age_group || '-'} / ${row.gender || '-'}</p>
                        <p>🎯 目的: ${row.purpose || '-'} / 目標: ${row.target_goal || '-'}</p>
                        <p>📝 悩み: ${row.status || '-'}</p>
                    </div>
                </div>`;
            });
            document.getElementById('data-container').innerHTML = html || '予約はありません。';
        }

        fetchReservations();
        setInterval(fetchReservations, 60000);
    </script>
</body>
</html>
