<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DPRO GYM オーナーダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <h1 class="text-2xl font-bold text-yellow-500 mb-6">予約状況一覧</h1>
    <div id="data-container" class="grid gap-4">読み込み中...</div>

    <script>
        // Supabaseクライアントの初期化（一度だけ行う）
        const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J'; 
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchReservations() {
            const container = document.getElementById('data-container');
            
            // データを取得
            const { data, error } = await sbClient
                .from('gym_profiles')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                container.innerHTML = 'エラー: ' + error.message;
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '予約データはありません。';
                return;
            }

            let html = '';
            data.forEach(row => {
                html += `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-yellow-400">${row.display_name || 'ゲスト様'}</span>
                        <span class="text-xs text-gray-500">${row.preferred_datetime || '日時未設定'}</span>
                    </div>
                    <div class="text-sm space-y-1 text-gray-300">
                        <p>👤 ${row.age_group || '-'} / ${row.gender || '-'}</p>
                        <p>🎯 目的: ${row.purpose || '-'} / 目標: ${row.target_goal || '-'}</p>
                        <p>📝 悩み: ${row.status || '-'}</p>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // 実行
        fetchReservations();
    </script>
</body>
</html>
