<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPRO GYM｜オーナーダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    .card-bg { background: linear-gradient(180deg, rgba(31,41,55,.98), rgba(17,24,39,.98)); }
    .fade-in { animation: fadeIn .2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <header class="sticky top-0 z-30 bg-black/90 backdrop-blur border-b border-yellow-500/30">
    <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <p class="text-[10px] tracking-[0.35em] text-yellow-500 font-black">DPRO GYM</p>
        <h1 class="text-2xl font-black mt-1">オーナーダッシュボード</h1>
        <p class="text-xs text-gray-400 mt-1">予約・会員・回数管理をLINEと連携</p>
      </div>
      <div class="flex gap-2">
        <a href="index.html" target="_blank" class="bg-gray-900 border border-gray-800 hover:border-yellow-500/60 text-gray-200 font-bold px-4 py-3 rounded-2xl text-sm transition">予約画面を確認</a>
        <button onclick="fetchReservations()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black px-5 py-3 rounded-2xl text-sm transition shadow-lg shadow-yellow-500/10">🔄 最新情報を取得</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 space-y-6">
    <section class="grid grid-cols-2 lg:grid-cols-5 gap-3 md:gap-4">
      <div class="card-bg border border-gray-800 rounded-3xl p-4"><p class="text-xs text-gray-400 font-bold">本日の予約</p><p id="metricToday" class="text-3xl font-black text-yellow-400 mt-2">-</p></div>
      <div class="card-bg border border-gray-800 rounded-3xl p-4"><p class="text-xs text-gray-400 font-bold">承認待ち</p><p id="metricPending" class="text-3xl font-black text-yellow-400 mt-2">-</p></div>
      <div class="card-bg border border-gray-800 rounded-3xl p-4"><p class="text-xs text-gray-400 font-bold">選択日の予約</p><p id="metricSelected" class="text-3xl font-black text-yellow-400 mt-2">-</p></div>
      <div class="card-bg border border-gray-800 rounded-3xl p-4"><p class="text-xs text-gray-400 font-bold">残り1回以下</p><p id="metricLowCount" class="text-3xl font-black text-yellow-400 mt-2">-</p></div>
      <div class="card-bg border border-gray-800 rounded-3xl p-4 col-span-2 lg:col-span-1"><p class="text-xs text-gray-400 font-bold">総会員・予約者</p><p id="metricTotal" class="text-3xl font-black text-yellow-400 mt-2">-</p></div>
    </section>

    <section class="card-bg border border-gray-800 rounded-3xl p-4 md:p-5 space-y-4">
      <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
        <div class="flex items-center gap-2 overflow-x-auto pb-1">
          <button onclick="changeDate(-1)" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 text-yellow-400 font-black px-4 py-3 rounded-2xl text-sm whitespace-nowrap">◀ 前日</button>
          <button onclick="setToday()" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-200 font-bold px-4 py-3 rounded-2xl text-sm whitespace-nowrap">今日</button>
          <button onclick="changeDate(1)" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 text-yellow-400 font-black px-4 py-3 rounded-2xl text-sm whitespace-nowrap">翌日 ▶</button>
        </div>
        <div class="flex flex-col sm:flex-row sm:items-center gap-3">
          <div id="dateDisplay" class="text-xl font-black text-yellow-400">-</div>
          <label class="inline-flex items-center gap-2 bg-gray-900 border border-gray-800 px-3 py-2 rounded-2xl text-sm text-gray-300">
            <input type="checkbox" id="showAllDates" onchange="toggleShowAllDates()" class="accent-yellow-500">
            全日程を表示
          </label>
        </div>
      </div>

      <div class="grid lg:grid-cols-[1fr_auto] gap-4">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">🔍</span>
          <input id="searchInput" type="text" oninput="applyFilters()" placeholder="会員名・目的・悩みで検索" class="w-full bg-gray-950 border border-gray-800 rounded-2xl pl-11 pr-4 py-3 text-sm focus:outline-none focus:border-yellow-500 placeholder-gray-600">
        </div>
        <div class="flex bg-gray-950 border border-gray-800 p-1 rounded-2xl overflow-x-auto">
          <button onclick="filterStatus('all')" id="tab-all" class="tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap bg-yellow-500 text-black">すべて</button>
          <button onclick="filterStatus('pending')" id="tab-pending" class="tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap text-gray-400">承認待ち</button>
          <button onclick="filterStatus('confirmed')" id="tab-confirmed" class="tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap text-gray-400">確定</button>
          <button onclick="filterStatus('cancelled')" id="tab-cancelled" class="tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap text-gray-400">再調整</button>
          <button onclick="filterStatus('low')" id="tab-low" class="tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap text-gray-400">残り少</button>
        </div>
      </div>
    </section>

    <section class="card-bg border border-gray-800 rounded-3xl p-4 md:p-5">
      <div class="flex items-center justify-between gap-4 mb-4">
        <div>
          <h2 class="text-lg font-black">今日の対応</h2>
          <p id="todoSummary" class="text-sm text-gray-400 mt-1">読み込み中...</p>
        </div>
      </div>
      <div id="todoList" class="grid md:grid-cols-2 lg:grid-cols-4 gap-3"></div>
    </section>

    <section>
      <div id="dataContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        <div class="col-span-full text-center py-16 text-gray-500">読み込み中...</div>
      </div>
    </section>
  </main>

<script>
  const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J';
  const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allReservations = [];
  let currentStatusFilter = 'all';
  let targetDate = new Date();
  let showAllDates = false;

  window.addEventListener('load', () => {
    updateDateDisplay();
    fetchReservations();
  });

  function localDateString(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function updateDateDisplay() {
    const y = targetDate.getFullYear();
    const m = String(targetDate.getMonth() + 1).padStart(2, '0');
    const d = String(targetDate.getDate()).padStart(2, '0');
    const w = ['日', '月', '火', '水', '木', '金', '土'][targetDate.getDay()];
    document.getElementById('dateDisplay').textContent = `${y}年${m}月${d}日(${w})`;
  }

  function changeDate(days) {
    targetDate.setDate(targetDate.getDate() + days);
    updateDateDisplay();
    if (showAllDates) {
      showAllDates = false;
      document.getElementById('showAllDates').checked = false;
    }
    applyFilters();
  }

  function setToday() {
    targetDate = new Date();
    updateDateDisplay();
    if (showAllDates) {
      showAllDates = false;
      document.getElementById('showAllDates').checked = false;
    }
    applyFilters();
  }

  function toggleShowAllDates() {
    showAllDates = document.getElementById('showAllDates').checked;
    applyFilters();
  }

  function filterStatus(status) {
    currentStatusFilter = status;
    ['all', 'pending', 'confirmed', 'cancelled', 'low'].forEach(t => {
      const btn = document.getElementById(`tab-${t}`);
      btn.className = t === status
        ? 'tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap bg-yellow-500 text-black'
        : 'tab px-4 py-2 rounded-xl text-xs font-black whitespace-nowrap text-gray-400 hover:text-white';
    });
    applyFilters();
  }

  async function fetchReservations() {
    const container = document.getElementById('dataContainer');
    container.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400">データを同期中...</div>';

    const { data, error } = await sbClient
      .from('gym_profiles')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      container.innerHTML = `<div class="col-span-full bg-red-500/10 border border-red-500/40 text-red-200 p-5 rounded-3xl text-center">エラー: ${escapeHtml(error.message)}</div>`;
      return;
    }

    allReservations = data || [];
    applyFilters();
  }

  function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const dateStr = localDateString(targetDate);

    const filtered = allReservations.filter(row => {
      const status = row.reservation_status || 'pending';
      const count = Number(row.remaining_count || 0);
      const searchable = [row.display_name, row.purpose, row.target_goal, row.status, row.preferred_datetime].join(' ').toLowerCase();
      if (query && !searchable.includes(query)) return false;
      if (currentStatusFilter === 'low' && count > 1) return false;
      if (!['all', 'low'].includes(currentStatusFilter) && status !== currentStatusFilter) return false;
      if (!showAllDates) {
        const pref = row.preferred_datetime || '';
        if (!pref.includes(dateStr)) return false;
      }
      return true;
    });

    renderMetrics();
    renderTodo();
    renderCards(filtered);
  }

  function renderMetrics() {
    const todayStr = localDateString(new Date());
    const selectedStr = localDateString(targetDate);
    const todayCount = allReservations.filter(r => (r.preferred_datetime || '').includes(todayStr)).length;
    const selectedCount = allReservations.filter(r => (r.preferred_datetime || '').includes(selectedStr)).length;
    const pendingCount = allReservations.filter(r => (r.reservation_status || 'pending') === 'pending').length;
    const lowCount = allReservations.filter(r => Number(r.remaining_count || 0) <= 1).length;

    document.getElementById('metricToday').textContent = todayCount;
    document.getElementById('metricPending').textContent = pendingCount;
    document.getElementById('metricSelected').textContent = selectedCount;
    document.getElementById('metricLowCount').textContent = lowCount;
    document.getElementById('metricTotal').textContent = allReservations.length;
  }

  function renderTodo() {
    const todayStr = localDateString(new Date());
    const pending = allReservations.filter(r => (r.reservation_status || 'pending') === 'pending');
    const today = allReservations.filter(r => (r.preferred_datetime || '').includes(todayStr));
    const low = allReservations.filter(r => Number(r.remaining_count || 0) <= 1);
    const cancelled = allReservations.filter(r => (r.reservation_status || 'pending') === 'cancelled');

    const items = [
      { icon: '✅', title: '承認待ち', count: pending.length, text: '予約可否を確認' },
      { icon: '📅', title: '本日来店', count: today.length, text: '来店準備・QR確認' },
      { icon: '💬', title: '再調整', count: cancelled.length, text: '別日程を案内' },
      { icon: '🔁', title: '継続提案', count: low.length, text: '残り回数が少ない会員' }
    ];

    document.getElementById('todoSummary').textContent = `承認待ち ${pending.length}件・本日来店 ${today.length}件・継続提案 ${low.length}件`;
    document.getElementById('todoList').innerHTML = items.map(item => `
      <div class="bg-gray-950 border border-gray-800 rounded-2xl p-4">
        <div class="flex items-center justify-between"><span class="text-2xl">${item.icon}</span><span class="text-2xl font-black text-yellow-400">${item.count}</span></div>
        <p class="font-black mt-3">${item.title}</p>
        <p class="text-xs text-gray-500 mt-1">${item.text}</p>
      </div>
    `).join('');
  }

  function renderCards(rows) {
    const container = document.getElementById('dataContainer');
    if (!rows.length) {
      container.innerHTML = '<div class="col-span-full text-center py-16 text-gray-500 border-2 border-dashed border-gray-800 rounded-3xl bg-gray-900/30">📭 条件に一致する予約・会員データはありません。</div>';
      return;
    }

    container.innerHTML = rows.map(row => {
      const id = escapeHtml(row.id);
      const name = escapeHtml(row.display_name || 'ゲスト様');
      const status = row.reservation_status || 'pending';
      const count = Number(row.remaining_count || 0);
      const badge = statusBadge(status);
      const nextAction = getNextAction(row);
      const date = escapeHtml(formatDateTime(row.preferred_datetime) || '未設定');
      const purpose = escapeHtml(row.purpose || '-');
      const goal = escapeHtml(row.target_goal || '-');
      const concern = escapeHtml(row.status || '-');
      const rawName = String(row.display_name || 'ゲスト様').replace(/'/g, "\\'");

      return `
        <article class="card-bg border border-gray-800 hover:border-yellow-500/40 rounded-3xl p-5 fade-in transition flex flex-col gap-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h3 class="text-xl font-black text-yellow-400 truncate">${name}</h3>
              <p class="text-xs text-gray-500 mt-1">${nextAction}</p>
            </div>
            ${badge}
          </div>

          <div class="bg-gray-950 border border-gray-800 rounded-2xl p-4 space-y-3 text-sm">
            <div class="flex gap-3"><span class="text-gray-500 w-16 shrink-0">日時</span><strong class="text-white">${date}</strong></div>
            <div class="flex gap-3"><span class="text-gray-500 w-16 shrink-0">目的</span><span>${purpose}</span></div>
            <div class="flex gap-3"><span class="text-gray-500 w-16 shrink-0">目標</span><span>${goal}</span></div>
            <div class="flex gap-3"><span class="text-gray-500 w-16 shrink-0">悩み</span><span>${concern}</span></div>
          </div>

          <div class="bg-gray-950 border border-gray-800 rounded-2xl p-4 flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-500 font-bold">残り回数</p>
              <p class="text-3xl font-black ${count <= 1 ? 'text-red-400' : 'text-yellow-400'}">${count}<span class="text-sm text-gray-500 ml-1">回</span></p>
            </div>
            <div class="flex gap-2">
              <button onclick="updateCount('${id}', ${count}, -1)" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl font-black">-1</button>
              <button onclick="updateCount('${id}', ${count}, 1)" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl font-black">+1</button>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <button onclick="updateStatus('${id}', 'confirmed')" class="bg-green-500 hover:bg-green-400 text-black py-3 rounded-2xl text-sm font-black">OK 承認</button>
            <button onclick="updateStatus('${id}', 'cancelled')" class="bg-red-500/90 hover:bg-red-500 text-white py-3 rounded-2xl text-sm font-black">NO 再調整</button>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <button onclick="copyName('${rawName}')" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 py-3 rounded-2xl text-sm font-bold text-gray-300">名前をコピー</button>
            <a href="https://manager.line.biz/" target="_blank" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 py-3 rounded-2xl text-sm font-bold text-gray-300 text-center">LINE管理画面</a>
          </div>
        </article>
      `;
    }).join('');
  }

  function statusBadge(status) {
    if (status === 'confirmed') return '<span class="bg-green-500 text-black text-xs font-black px-3 py-1 rounded-full shrink-0">確定</span>';
    if (status === 'cancelled') return '<span class="bg-red-500 text-white text-xs font-black px-3 py-1 rounded-full shrink-0">再調整</span>';
    return '<span class="bg-yellow-500 text-black text-xs font-black px-3 py-1 rounded-full shrink-0">承認待ち</span>';
  }

  function getNextAction(row) {
    const status = row.reservation_status || 'pending';
    const count = Number(row.remaining_count || 0);
    if (count <= 0) return '次にすること：継続・回数券の提案';
    if (count === 1) return '次にすること：次回更新の声かけ';
    if (status === 'pending') return '次にすること：予約を承認する';
    if (status === 'confirmed') return '次にすること：来店準備';
    if (status === 'cancelled') return '次にすること：別日程を案内';
    return '次にすること：状況確認';
  }

  async function updateStatus(id, newStatus) {
    const { error } = await sbClient.from('gym_profiles').update({ reservation_status: newStatus }).eq('id', id);
    if (error) return alert('ステータス更新失敗: ' + error.message);
    fetchReservations();
  }

  async function updateCount(id, currentCount, delta) {
    const newCount = Math.max(0, Number(currentCount || 0) + delta);
    const { error } = await sbClient.from('gym_profiles').update({ remaining_count: newCount }).eq('id', id);
    if (error) return alert('回数更新失敗: ' + error.message);
    fetchReservations();
  }

  async function copyName(name) {
    try {
      await navigator.clipboard.writeText(name);
      alert(`「${name}」をコピーしました`);
    } catch (e) {
      prompt('コピーしてください', name);
    }
  }

  function formatDateTime(value) {
    if (!value) return '';
    const text = String(value).replace('T', ' ');
    const [date, timeRaw] = text.split(' ');
    if (!date) return text;
    const [y, m, d] = date.split('-').map(Number);
    if (!y || !m || !d) return text;
    const dt = new Date(y, m - 1, d);
    const w = ['日', '月', '火', '水', '木', '金', '土'][dt.getDay()];
    const time = timeRaw ? timeRaw.slice(0, 5) : '';
    return `${m}/${d}(${w}) ${time}`;
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>'"]/g, char => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[char]));
  }
</script>
</body>
</html>
