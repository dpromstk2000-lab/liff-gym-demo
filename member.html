<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員マイページ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #ffffff; width: 90%; max-width: 400px; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; color: #1a1a1a; letter-spacing: 0.05em; }
        .info { margin: 15px 0; padding: 20px; background: #fdfdfd; border: 1px solid #f0f0f0; border-radius: 16px; }
        .label { font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .value { font-size: 1.1rem; font-weight: 600; color: #333; }
        .count { font-size: 3rem; font-weight: 800; color: #2d3436; line-height: 1; }
        .btn-reserve { display: block; margin: 25px 0; padding: 16px; background: #2d3436; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; transition: background 0.3s; }
        .btn-reserve:hover { background: #1a1a1a; }
        #qrcode { margin-top: 25px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
        #qrImg { width: 160px; height: 160px; border-radius: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="title">MY PAGE</div>
    
    <div id="userInfo" class="info">読込中...</div>
    
    <div id="memberStatus" class="info">
        <div class="label">残りセッション回数</div>
        <div id="countDisplay" class="count">-</div>
    </div>

    <div id="reservationStatus" class="info">
        <div class="label">次回の予約日時</div>
        <div id="resDateDisplay" class="value">-</div>
    </div>

    <a href="reserve.html" class="btn-reserve">予約・変更をする</a>

    <div id="qrcode">
        <img id="qrImg" src="" alt="QRコード">
    </div>
</div>

<script>
    const supabaseUrl = 'https://cbknucemarcpbscirzyv.supabase.co';
    const supabaseKey = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function init() {
        await liff.init({ liffId: "2010362463-80AFWCcm" });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        
        const profile = await liff.getProfile();
        fetchMemberData(profile.userId);
    }

    async function fetchMemberData(lineId) {
        const { data, error } = await supabaseClient
            .from('gym_profiles')
            .select('*')
            .eq('line_user_id', lineId)
            .single();

        if (data) {
            document.getElementById('userInfo').innerText = `${data.display_name} 様`;
            document.getElementById('countDisplay').innerText = `${data.remaining_count}`;
            document.getElementById('resDateDisplay').innerText = data.preferred_datetime ? data.preferred_datetime.replace('T', ' ') : "予約はありません";
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${lineId}`;
        } else {
            document.getElementById('userInfo').innerText = "登録情報が見つかりません";
        }
    }

    init();
</script>
</body>
</html>
