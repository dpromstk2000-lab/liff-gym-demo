<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPRO GYM｜マイページ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }
    .glass { background: linear-gradient(180deg, rgba(31,41,55,.96), rgba(17,24,39,.96)); }
    .safe-bottom { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
    .fade-in { animation: fadeIn .2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <main class="max-w-md mx-auto min-h-screen glass shadow-2xl border-x border-gray-800 flex flex-col">
    <header class="bg-black/90 border-b border-yellow-500/30 px-5 py-4">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-[10px] tracking-[0.35em] text-yellow-500 font-black">DPRO GYM</p>
          <h1 class="text-lg font-black mt-1">会員マイページ</h1>
        </div>
        <span id="statusBadge" class="text-[11px] bg-gray-800 text-gray-300 font-black px-3 py-1 rounded-full border border-gray-700">読込中</span>
      </div>
    </header>

    <section class="p-5 flex-1 safe-bottom fade-in">
      <div id="loading" class="text-center py-16 text-gray-400">会員情報を読み込み中...</div>

      <div id="content" class="hidden space-y-5">
        <div class="rounded-3xl bg-gradient-to-br from-yellow-500 to-yellow-300 p-5 text-black shadow-xl shadow-yellow-500/10">
          <p class="text-xs font-black tracking-widest opacity-80">MY PAGE</p>
          <h2 id="welcomeName" class="text-2xl font-black mt-2 leading-tight">こんにちは</h2>
          <p id="nextAction" class="text-sm font-bold mt-3 opacity-80">次回予約と残り回数を確認できます。</p>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-900 border border-gray-800 rounded-3xl p-4">
            <p class="text-xs text-gray-400 font-bold">残り回数</p>
            <div class="mt-2 flex items-end gap-1"><span id="countDisplay" class="text-4xl font-black text-yellow-400">-</span><span class="text-sm text-gray-400 mb-1">回</span></div>
          </div>
          <div class="bg-gray-900 border border-gray-800 rounded-3xl p-4">
            <p class="text-xs text-gray-400 font-bold">予約状態</p>
            <div id="reservationLabel" class="mt-3 text-lg font-black">-</div>
            <p id="reservationSub" class="text-xs text-gray-500 mt-1">-</p>
          </div>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 space-y-4">
          <div class="flex items-center justify-between gap-4">
            <div>
              <p class="text-xs text-gray-400 font-bold">次回予約</p>
              <p id="resDateDisplay" class="text-xl font-black text-yellow-400 mt-1">-</p>
            </div>
            <div class="text-3xl">📅</div>
          </div>
          <div class="h-px bg-gray-800"></div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div>
              <p class="text-gray-500 text-xs">目的</p>
              <p id="purposeDisplay" class="font-bold mt-1">-</p>
            </div>
            <div>
              <p class="text-gray-500 text-xs">目標</p>
              <p id="goalDisplay" class="font-bold mt-1">-</p>
            </div>
          </div>
        </div>

        <div class="space-y-3">
          <a href="index.html" class="block w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black text-center py-4 rounded-2xl transition">予約・変更をする</a>
          <button onclick="closeLiff()" class="w-full bg-gray-900 border border-gray-800 text-gray-300 font-bold py-4 rounded-2xl">LINEトークに戻る</button>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-3xl p-5 text-center">
          <p class="text-xs text-gray-400 font-bold">来店チェックイン</p>
          <p class="text-sm text-gray-500 mt-2">来店時にスタッフへ提示してください</p>
          <div class="mt-4 bg-white p-3 rounded-2xl inline-block">
            <img id="qrImg" src="" alt="チェックインQR" class="w-40 h-40 rounded-xl" />
          </div>
        </div>
      </div>

      <div id="emptyState" class="hidden space-y-5 text-center py-12">
        <div class="mx-auto w-20 h-20 bg-gray-900 border border-gray-800 rounded-full flex items-center justify-center text-4xl">📝</div>
        <div>
          <h2 class="text-xl font-black">登録情報がありません</h2>
          <p class="text-sm text-gray-400 mt-3 leading-relaxed">まずは無料体験予約から登録してください。LINEのお名前を自動で取得して予約できます。</p>
        </div>
        <a href="index.html" class="block w-full bg-yellow-500 text-black font-black py-4 rounded-2xl">無料体験を予約する</a>
      </div>
    </section>
  </main>

<script>
  const MY_LIFF_ID = '2010362463-80AFWCcm';
  const SUPABASE_URL = 'https://cbknucemarcpbscirzyv.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_cT4vj0FoU1MtjFayuk7HVw_YcuSMR5J';
  const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const state = { displayName: 'デモユーザー', userId: 'demo-user' };
  window.addEventListener('load', init);

  async function init() {
    try {
      await liff.init({ liffId: MY_LIFF_ID });
      if (!liff.isLoggedIn() && liff.isInClient()) {
        liff.login();
        return;
      }
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        state.displayName = profile.displayName || 'ゲスト様';
        state.userId = profile.userId || 'demo-user';
      }
    } catch (e) {
      console.warn('LIFF demo mode:', e);
    }
    await fetchMemberData();
  }

  async function fetchMemberData() {
    const { data, error } = await sbClient
      .from('gym_profiles')
      .select('*')
      .eq('line_user_id', state.userId)
      .maybeSingle();

    document.getElementById('loading').classList.add('hidden');
    if (error) {
      document.getElementById('emptyState').classList.remove('hidden');
      document.getElementById('statusBadge').textContent = 'エラー';
      return;
    }
    if (!data) {
      document.getElementById('emptyState').classList.remove('hidden');
      document.getElementById('statusBadge').textContent = '未登録';
      return;
    }

    renderMember(data);
  }

  function renderMember(data) {
    const name = data.display_name || state.displayName || 'ゲスト';
    const count = Number(data.remaining_count || 0);
    const status = data.reservation_status || 'pending';
    const dateText = formatDateTime(data.preferred_datetime);

    document.getElementById('content').classList.remove('hidden');
    document.getElementById('welcomeName').textContent = `こんにちは、${name}様`;
    document.getElementById('countDisplay').textContent = count;
    document.getElementById('resDateDisplay').textContent = dateText || '予約はありません';
    document.getElementById('purposeDisplay').textContent = data.purpose || '-';
    document.getElementById('goalDisplay').textContent = data.target_goal || '-';
    document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(data.line_user_id || state.userId)}`;

    const badge = document.getElementById('statusBadge');
    const label = document.getElementById('reservationLabel');
    const sub = document.getElementById('reservationSub');
    const action = document.getElementById('nextAction');

    if (!data.preferred_datetime) {
      badge.className = 'text-[11px] bg-gray-800 text-gray-300 font-black px-3 py-1 rounded-full border border-gray-700';
      badge.textContent = '未予約';
      label.textContent = '未予約';
      sub.textContent = '予約できます';
      action.textContent = '無料体験または次回予約をLINEから簡単に申し込めます。';
    } else if (status === 'confirmed') {
      badge.className = 'text-[11px] bg-green-500 text-black font-black px-3 py-1 rounded-full';
      badge.textContent = '予約確定';
      label.textContent = '確定済み';
      sub.textContent = '当日お待ちしています';
      action.textContent = '予約は確定しています。当日はQRをスタッフへ提示してください。';
    } else if (status === 'cancelled') {
      badge.className = 'text-[11px] bg-red-500 text-white font-black px-3 py-1 rounded-full';
      badge.textContent = '再調整';
      label.textContent = '再予約可';
      sub.textContent = '別日で予約できます';
      action.textContent = '予約が再調整になりました。別日で再度お申し込みください。';
    } else {
      badge.className = 'text-[11px] bg-yellow-500 text-black font-black px-3 py-1 rounded-full';
      badge.textContent = '承認待ち';
      label.textContent = '承認待ち';
      sub.textContent = 'オーナー確認中';
      action.textContent = '予約を受け付けました。オーナー確認後、確定連絡が届きます。';
    }
  }

  function formatDateTime(value) {
    if (!value) return '';
    const text = String(value).replace('T', ' ');
    const [date, timeRaw] = text.split(' ');
    if (!date) return text;
    const [y, m, d] = date.split('-').map(Number);
    if (!y || !m || !d) return text;
    const dt = new Date(y, m - 1, d);
    const w = ['日', '月', '火', '水', '木', '金', '土'][dt.getDay()];
    const time = timeRaw ? timeRaw.slice(0, 5) : '';
    return `${m}/${d}(${w}) ${time}`;
  }

  function closeLiff() {
    try {
      if (typeof liff !== 'undefined' && liff.isInClient()) liff.closeWindow();
      else location.href = 'index.html';
    } catch (e) {
      location.href = 'index.html';
    }
  }
</script>
</body>
</html>
